<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico"/>
  <title>Iniciar Sesión — Licorera Inteligente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-brand">
    <div class="login-logo">🍾</div>
    <h1 class="login-title">Licorera<br><strong>Inteligente</strong></h1>
    <p class="login-subtitle">Sistema de gestión para tu negocio</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}" style="margin-bottom:1rem">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">
    <div class="form-group">
      <label class="form-label" for="username">Usuario</label>
      <input class="form-input" type="text" id="username" name="username"
             placeholder="Ej: admin" required autocomplete="username"/>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div class="password-wrapper">
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password"/>
        <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
      </div>
    </div>

    <button class="btn btn-primary btn-block" type="submit">Iniciar Sesión</button>
  </form>

  <div class="login-hint">
    <small>
      👤 <strong>Admin:</strong> admin / admin123 &nbsp;|&nbsp;
      👤 <strong>Empleado:</strong> empleado / emp123
    </small>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
