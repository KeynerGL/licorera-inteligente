{% extends 'base.html' %}
{% block title %}Nuevo Usuario — Licorera Inteligente{% endblock %}
{% block page_title %}Nuevo Usuario{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2 class="page-title">➕ Nuevo Usuario</h2>
    <p class="page-sub">Agrega un nuevo acceso al sistema.</p>
  </div>
  <a href="{{ url_for('auth.users') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="card" style="max-width:500px">
  <form method="POST" action="{{ url_for('auth.add_user') }}">
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input class="form-input" type="text" name="full_name" required placeholder="Ej: Juan Pérez"/>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre de usuario</label>
      <input class="form-input" type="text" name="username" required placeholder="Ej: juanp"/>
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" name="password" required placeholder="Mínimo 6 caracteres"/>
    </div>
    <div class="form-group">
      <label class="form-label">Rol</label>
      <select class="form-input" name="role">
        <option value="empleado">Empleado</option>
        <option value="admin">Administrador</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" type="submit">Crear Usuario</button>
  </form>
</div>
{% endblock %}
